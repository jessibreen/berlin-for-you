<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Berlin ♥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ── Reset & root ──────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:       #0e0e12;
  --surface:  #17171e;
  --border:   #2a2a36;
  --gold:     #d4a84b;
  --gold-dim: #8a6d30;
  --rose:     #c8705f;
  --text:     #e8e4dc;
  --muted:    #7a7570;
  --active:   #4caf82;
  --shadow:   rgba(0,0,0,0.5);
  --radius:   14px;
}

html, body {
  height: 100%; height: 100dvh;
  font-family: 'Jost', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ── Header ────────────────────────────────────────────────────────── */
header {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 12px;
  background: linear-gradient(to bottom, rgba(14,14,18,0.97) 60%, transparent);
  pointer-events: none;
}

header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 1.45rem;
  letter-spacing: 0.06em;
  color: var(--text);
  pointer-events: none;
}

header h1 em {
  font-style: italic;
  color: var(--gold);
}

.track-btn {
  pointer-events: all;
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'Jost', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 7px 14px;
  border-radius: 24px;
  border: 1px solid var(--gold-dim);
  background: rgba(14,14,18,0.85);
  color: var(--gold);
  cursor: pointer;
  transition: all 0.25s;
  backdrop-filter: blur(8px);
}

.track-btn:hover { border-color: var(--gold); background: rgba(212,168,75,0.1); }
.track-btn.tracking { border-color: var(--active); color: var(--active); }
.track-btn .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.track-btn.tracking .dot { animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Map ───────────────────────────────────────────────────────────── */
#map {
  position: absolute;
  inset: 0;
  z-index: 1;
}

/* ── Category filters ──────────────────────────────────────────────── */
.filters {
  position: absolute;
  top: 62px;
  left: 0; right: 0;
  z-index: 900;
  display: flex;
  gap: 7px;
  padding: 0 16px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.filters::-webkit-scrollbar { display: none; }

.filter-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.74rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: rgba(14,14,18,0.82);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  backdrop-filter: blur(8px);
  flex-shrink: 0;
}

.filter-chip.on {
  border-color: var(--gold-dim);
  color: var(--gold);
  background: rgba(212,168,75,0.08);
}

.filter-chip .chip-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* ── Status bar ────────────────────────────────────────────────────── */
.status {
  position: absolute;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 900;
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  color: var(--muted);
  background: rgba(14,14,18,0.82);
  border: 1px solid var(--border);
  padding: 5px 13px;
  border-radius: 20px;
  backdrop-filter: blur(8px);
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 0.3s;
}
.status.hidden { opacity: 0; }
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
}
.status-dot.on { background: var(--active); animation: blink 1.5s infinite; }

/* ── FAB ───────────────────────────────────────────────────────────── */
.fab-group {
  position: absolute;
  right: 16px;
  bottom: 28px;
  z-index: 800;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.fab {
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 18px var(--shadow);
  transition: transform 0.2s, border-color 0.2s;
}
.fab:hover { transform: scale(1.08); border-color: var(--gold-dim); }

/* ── Drawer ────────────────────────────────────────────────────────── */
.drawer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 950;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 0 20px 32px;
  transform: translateY(100%);
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
  max-height: 75dvh;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.drawer.open { transform: translateY(0); }

.drawer-handle {
  width: 36px; height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 18px;
}

.drawer h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 1.3rem;
  margin-bottom: 3px;
  color: var(--text);
}

.drawer .sub {
  font-size: 0.78rem;
  color: var(--muted);
  margin-bottom: 18px;
  font-weight: 300;
}

/* ── POI card list ─────────────────────────────────────────────────── */
.poi-list { display: flex; flex-direction: column; gap: 10px; }

.poi-card {
  display: flex;
  align-items: flex-start;
  gap: 13px;
  padding: 13px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.2s;
}
.poi-card:hover { border-color: var(--gold-dim); }

.poi-card-icon {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  border: 1px solid var(--border);
}

.poi-card-body { flex: 1; min-width: 0; }
.poi-card-body strong {
  display: block;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.poi-card-body small {
  font-size: 0.74rem;
  color: var(--muted);
  font-weight: 300;
}

.poi-badge {
  font-size: 0.68rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  color: var(--muted);
  flex-shrink: 0;
  align-self: center;
}

/* ── Popup ─────────────────────────────────────────────────────────── */
.leaflet-popup-content-wrapper {
  background: var(--surface) !important;
  border: 1px solid var(--border) !important;
  border-radius: var(--radius) !important;
  box-shadow: 0 8px 32px var(--shadow) !important;
  color: var(--text) !important;
  font-family: 'Jost', sans-serif !important;
  max-width: 280px;
  padding: 0 !important;
}
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-close-button { color: var(--muted) !important; top: 10px !important; right: 12px !important; }

.popup-inner { padding: 16px 18px 14px; }

.popup-cat {
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 4px;
  font-weight: 500;
}

.popup-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 2px;
  line-height: 1.2;
}

.popup-addr {
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 10px;
  font-weight: 300;
}

.popup-note {
  font-size: 0.82rem;
  color: #c8c2b8;
  line-height: 1.55;
  border-left: 2px solid var(--gold-dim);
  padding-left: 10px;
  margin-bottom: 12px;
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.95rem;
}

.popup-photos {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  margin-bottom: 10px;
}
.popup-photos::-webkit-scrollbar { display: none; }
.popup-photos img {
  height: 90px;
  width: auto;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid var(--border);
}

.popup-radius {
  font-size: 0.7rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}
.popup-radius::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold-dim);
}

/* ── Toasts ────────────────────────────────────────────────────────── */
.toasts {
  position: absolute;
  top: 100px;
  left: 50%; transform: translateX(-50%);
  z-index: 2000;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  width: 90%; max-width: 340px;
  pointer-events: none;
}

.toast {
  width: 100%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 0.82rem;
  line-height: 1.45;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  box-shadow: 0 6px 24px var(--shadow);
  animation: tin 0.3s ease, tout 0.3s ease 3.7s forwards;
  backdrop-filter: blur(12px);
}
.toast.alert { border-left-color: var(--rose); }
.toast strong { color: var(--gold); }
.toast.alert strong { color: var(--rose); }

@keyframes tin  { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
@keyframes tout { from{opacity:1} to{opacity:0} }

/* ── Leaflet overrides ─────────────────────────────────────────────── */
.leaflet-control-zoom a {
  background: var(--surface) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
}
.leaflet-control-zoom a:hover { background: var(--bg) !important; }

@media (min-width: 600px) {
  .drawer {
    left: auto; right: 16px; bottom: 16px;
    width: 330px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    transform: translateX(380px);
    max-height: 70dvh;
  }
  .drawer.open { transform: translateX(0); }
}
</style>
</head>
<body>

<div id="map"></div>

<header>
  <h1>Berlin <em>♥</em></h1>
  <button class="track-btn" id="trackBtn" onclick="toggleTracking()">
    <span class="dot"></span>
    <span id="trackLabel">Track me</span>
  </button>
</header>

<div class="filters" id="filters"></div>

<div class="status hidden" id="status">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Locating…</span>
</div>

<div class="toasts" id="toasts"></div>

<div class="fab-group">
  <button class="fab" title="All places" onclick="toggleDrawer()">≡</button>
  <button class="fab" title="My location" onclick="centerOnUser()">◎</button>
</div>

<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div id="drawerBody"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIGURATION — edit these to match your repo and categories
// ═══════════════════════════════════════════════════════════════════
const CONFIG = {
  // Path to GeoJSON, relative to this HTML file in the same repo
  geojsonPath: './data/pois.geojson',

  // Berlin centre
  // mapCenter: [38.9072, -77.0369],
  // mapZoom: 13,

  // DC Center
  mapCenter: [38.9072, -77.0369],
  mapZoom: 13,

  // Default alert radius (metres) per category — override per-feature with "radius" property
  categoryDefaults: {
    landmark:     200,
    building:     180,
    museum:       150,
    neighbourhood:120,
    cafe:          80,
    restaurant:    80,
    bar:           70,
    shop:          60,
    park:         150,
    artwork:       40,
    other:        100
  },

  // Emoji + colour per category
  categoryStyle: {
    landmark:     { emoji: '🏛', color: '#d4a84b' },
    building:     { emoji: '🏢', color: '#a0a0c0' },
    museum:       { emoji: '🖼', color: '#b06090' },
    neighbourhood:{ emoji: '🏘', color: '#70b080' },
    cafe:         { emoji: '☕', color: '#c8a070' },
    restaurant:   { emoji: '🍽', color: '#d07060' },
    bar:          { emoji: '🍸', color: '#8060b0' },
    shop:         { emoji: '🛍', color: '#60a0c0' },
    park:         { emoji: '🌿', color: '#50a060' },
    artwork:      { emoji: '🎨', color: '#c05080' },
    other:        { emoji: '📍', color: '#8a8070' }
  }
};

// ═══════════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════════
let allFeatures   = [];
let activeFilters = new Set(['all']);
let leafletLayers = {};   // id → { marker, circle }
let tracking      = false;
let watchId       = null;
let userMarker    = null;
let alerted       = new Set();
let drawerOpen    = false;

// ═══════════════════════════════════════════════════════════════════
// Map
// ═══════════════════════════════════════════════════════════════════
const map = L.map('map', { zoomControl: false })
  .setView(CONFIG.mapCenter, CONFIG.mapZoom);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'topright' }).addTo(map);
map.on('click', () => { if (drawerOpen) closeDrawer(); });

// ═══════════════════════════════════════════════════════════════════
// Load GeoJSON
// ═══════════════════════════════════════════════════════════════════
async function loadPOIs() {
  try {
    const res = await fetch(CONFIG.geojsonPath);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const gj = await res.json();
    allFeatures = gj.features || [];
    buildFilters();
    renderMarkers();
  } catch (e) {
    toast(`⚠️ Could not load POI data.<br><small>${e.message}</small>`, true);
    console.error(e);
  }
}

// ═══════════════════════════════════════════════════════════════════
// Filters
// ═══════════════════════════════════════════════════════════════════
function buildFilters() {
  const cats = [...new Set(allFeatures.map(f => f.properties.category || 'other'))];
  const container = document.getElementById('filters');

  const allChip = makeChip('all', 'All', true);
  container.appendChild(allChip);

  cats.forEach(cat => {
    const style = CONFIG.categoryStyle[cat] || CONFIG.categoryStyle.other;
    container.appendChild(makeChip(cat, `${style.emoji} ${cap(cat)}`, false));
  });
}

function makeChip(cat, label, active) {
  const btn = document.createElement('button');
  btn.className = 'filter-chip' + (active ? ' on' : '');
  btn.innerHTML = `<span class="chip-dot"></span>${label}`;
  btn.onclick = () => toggleFilter(cat, btn);
  return btn;
}

function toggleFilter(cat, btn) {
  if (cat === 'all') {
    activeFilters = new Set(['all']);
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('on'));
    btn.classList.add('on');
  } else {
    activeFilters.delete('all');
    document.querySelector('.filter-chip').classList.remove('on'); // "All" chip
    if (activeFilters.has(cat)) {
      activeFilters.delete(cat);
      btn.classList.remove('on');
      if (activeFilters.size === 0) {
        activeFilters.add('all');
        document.querySelector('.filter-chip').classList.add('on');
      }
    } else {
      activeFilters.add(cat);
      btn.classList.add('on');
    }
  }
  applyFilters();
}

function isVisible(feature) {
  if (activeFilters.has('all')) return true;
  return activeFilters.has(feature.properties.category || 'other');
}

function applyFilters() {
  allFeatures.forEach(f => {
    const id = featureId(f);
    const layers = leafletLayers[id];
    if (!layers) return;
    const show = isVisible(f);
    if (show) { layers.marker.addTo(map); layers.circle.addTo(map); }
    else { map.removeLayer(layers.marker); map.removeLayer(layers.circle); }
  });
  if (drawerOpen) renderDrawer();
}

// ═══════════════════════════════════════════════════════════════════
// Markers
// ═══════════════════════════════════════════════════════════════════
function featureId(f) {
  return f.properties.name + '_' + f.geometry.coordinates.join('_');
}

function getRadius(f) {
  const p = f.properties;
  if (p.radius) return p.radius;
  return CONFIG.categoryDefaults[p.category] || CONFIG.categoryDefaults.other;
}

function makeIcon(cat, triggered = false) {
  const style = CONFIG.categoryStyle[cat] || CONFIG.categoryStyle.other;
  const bg    = triggered ? '#c8705f' : style.color;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:34px;height:34px;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      background:${bg};
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 3px 12px rgba(0,0,0,0.5);
      border:1.5px solid rgba(255,255,255,0.15);
    "><span style="transform:rotate(45deg);font-size:0.95rem">${(CONFIG.categoryStyle[cat]||CONFIG.categoryStyle.other).emoji}</span></div>`,
    iconSize: [34, 34],
    iconAnchor: [17, 34],
    popupAnchor: [0, -36]
  });
}

function makePopup(f) {
  const p = f.properties;
  const style = CONFIG.categoryStyle[p.category] || CONFIG.categoryStyle.other;
  const photos = (p.photos || []).filter(Boolean);
  const radius = getRadius(f);

  return `<div class="popup-inner">
    <div class="popup-cat">${style.emoji} ${cap(p.category || 'place')}</div>
    <div class="popup-name">${p.name || 'Unnamed'}</div>
    ${p.address ? `<div class="popup-addr">📍 ${p.address}</div>` : ''}
    ${p.note    ? `<div class="popup-note">${p.note}</div>` : ''}
    ${photos.length ? `<div class="popup-photos">${photos.map(src =>
      `<img src="${src}" alt="" loading="lazy"/>`).join('')}</div>` : ''}
    <div class="popup-radius">Alert within ${radius}m</div>
  </div>`;
}

function renderMarkers() {
  // Clear existing
  Object.values(leafletLayers).forEach(l => {
    map.removeLayer(l.marker);
    map.removeLayer(l.circle);
  });
  leafletLayers = {};

  allFeatures.forEach(f => {
    const [lng, lat] = f.geometry.coordinates;
    const p   = f.properties;
    const cat = p.category || 'other';
    const id  = featureId(f);
    const r   = getRadius(f);
    const style = CONFIG.categoryStyle[cat] || CONFIG.categoryStyle.other;

    const marker = L.marker([lat, lng], { icon: makeIcon(cat, alerted.has(id)) })
      .bindPopup(makePopup(f), { maxWidth: 280 });

    const circle = L.circle([lat, lng], {
      radius: r,
      color: style.color,
      fillColor: style.color,
      fillOpacity: 0.05,
      weight: 1,
      dashArray: '3 5'
    });

    if (isVisible(f)) { marker.addTo(map); circle.addTo(map); }

    leafletLayers[id] = { marker, circle };
  });
}

// ═══════════════════════════════════════════════════════════════════
// Drawer (list view)
// ═══════════════════════════════════════════════════════════════════
function toggleDrawer() {
  drawerOpen ? closeDrawer() : openDrawer();
}

function openDrawer() {
  drawerOpen = true;
  renderDrawer();
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  drawerOpen = false;
  document.getElementById('drawer').classList.remove('open');
}

function renderDrawer() {
  const visible = allFeatures.filter(isVisible);
  const body = document.getElementById('drawerBody');

  if (visible.length === 0) {
    body.innerHTML = `<h2>Places</h2><p class="sub" style="text-align:center;padding:24px 0">No places in this category.</p>`;
    return;
  }

  body.innerHTML = `
    <h2>Places</h2>
    <p class="sub">${visible.length} spot${visible.length !== 1 ? 's' : ''} to discover</p>
    <div class="poi-list">
      ${visible.map(f => {
        const p = f.properties;
        const style = CONFIG.categoryStyle[p.category] || CONFIG.categoryStyle.other;
        const id = featureId(f);
        return `<div class="poi-card" onclick="flyTo('${id}')">
          <div class="poi-card-icon" style="background:${style.color}18;border-color:${style.color}44">
            ${style.emoji}
          </div>
          <div class="poi-card-body">
            <strong>${p.name || 'Unnamed'}</strong>
            <small>${p.address || cap(p.category || 'place')}</small>
          </div>
          <span class="poi-badge">${cap(p.category || 'other')}</span>
        </div>`;
      }).join('')}
    </div>`;
}

function flyTo(id) {
  const f = allFeatures.find(f => featureId(f) === id);
  if (!f) return;
  const [lng, lat] = f.geometry.coordinates;
  map.flyTo([lat, lng], 17, { duration: 0.9 });
  setTimeout(() => leafletLayers[id]?.marker.openPopup(), 950);
  closeDrawer();
}

// ═══════════════════════════════════════════════════════════════════
// Location tracking
// ═══════════════════════════════════════════════════════════════════
function toggleTracking() {
  tracking ? stopTracking() : startTracking();
}

function startTracking() {
  if (!('geolocation' in navigator)) {
    toast('⚠️ Geolocation not supported on this device.', true); return;
  }
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  watchId = navigator.geolocation.watchPosition(onPosition, onPosError, {
    enableHighAccuracy: true, maximumAge: 5000, timeout: 15000
  });

  tracking = true;
  const btn = document.getElementById('trackBtn');
  btn.classList.add('tracking');
  document.getElementById('trackLabel').textContent = 'Tracking';
  setStatus('on', 'Searching for GPS…');
  showStatus();
}

function stopTracking() {
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  tracking = false;
  if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
  const btn = document.getElementById('trackBtn');
  btn.classList.remove('tracking');
  document.getElementById('trackLabel').textContent = 'Track me';
  hideStatus();
}

function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  setStatus('on', `±${Math.round(accuracy)}m accuracy`);

  const userIcon = L.divIcon({
    className: '',
    html: `<div style="width:16px;height:16px;border-radius:50%;background:#4caf82;border:2.5px solid white;box-shadow:0 0 0 5px rgba(76,175,130,0.2),0 2px 8px rgba(0,0,0,0.4)"></div>`,
    iconSize: [16,16], iconAnchor: [8,8]
  });

  if (!userMarker) {
    userMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 2000 }).addTo(map);
    map.flyTo([lat, lng], 15, { duration: 1.2 });
  } else {
    userMarker.setLatLng([lat, lng]);
  }

  // Proximity check
  allFeatures.forEach(f => {
    if (!isVisible(f)) return;
    const [flng, flat] = f.geometry.coordinates;
    const dist = haversine(lat, lng, flat, flng);
    const id   = featureId(f);
    const r    = getRadius(f);

    if (dist <= r && !alerted.has(id)) {
      alerted.add(id);
      triggerAlert(f, Math.round(dist), id);
    }
  });
}

function onPosError(err) {
  const msgs = { 1:'Location permission denied.', 2:'Position unavailable.', 3:'Location timed out.' };
  toast(`⚠️ ${msgs[err.code] || 'Location error'}`, true);
  setStatus('', msgs[err.code] || 'Error');
}

function triggerAlert(f, dist, id) {
  const p = f.properties;
  const style = CONFIG.categoryStyle[p.category] || CONFIG.categoryStyle.other;

  // Browser notification
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(`${style.emoji} ${p.name}`, {
      body: p.note ? p.note.slice(0, 100) : `You are ${dist}m away`,
      silent: false
    });
  }

  // Vibrate
  if ('vibrate' in navigator) navigator.vibrate([150, 80, 150, 80, 300]);

  // In-app toast
  toast(`${style.emoji} <strong>${p.name}</strong> — ${dist}m away!${p.note ? `<br><em style="opacity:0.75;font-size:0.78rem">${p.note.slice(0,80)}…</em>` : ''}`, true);

  // Update marker colour & fly
  const [lng, lat] = f.geometry.coordinates;
  map.flyTo([lat, lng], 17, { duration: 1 });
  setTimeout(() => leafletLayers[id]?.marker.openPopup(), 1100);

  // Refresh icon to show triggered state
  leafletLayers[id]?.marker.setIcon(makeIcon(p.category || 'other', true));
}

function centerOnUser() {
  if (userMarker) map.flyTo(userMarker.getLatLng(), 16, { duration: 0.8 });
  else toast('Start tracking first to see your location.');
}

// ═══════════════════════════════════════════════════════════════════
// Utilities
// ═══════════════════════════════════════════════════════════════════
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000, r = Math.PI / 180;
  const dLat = (lat2-lat1)*r, dLng = (lng2-lng1)*r;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function toast(html, isAlert = false) {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast' + (isAlert ? ' alert' : '');
  t.innerHTML = html;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4200);
}

function setStatus(state, text) {
  document.getElementById('statusDot').className = 'status-dot' + (state ? ' ' + state : '');
  document.getElementById('statusText').textContent = text;
}
function showStatus() { document.getElementById('status').classList.remove('hidden'); }
function hideStatus() { document.getElementById('status').classList.add('hidden'); }

// ═══════════════════════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════════════════════
loadPOIs();
</script>
