<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Berlin for You ♥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="map"></div>

<header>
  <h1>Berlin <em>♥</em></h1>
  <button class="track-btn" id="trackBtn" onclick="toggleTracking()">
    <span class="dot"></span>
    <span id="trackLabel">Track me</span>
  </button>
</header>

<div class="filters" id="filters"></div>

<div class="status hidden" id="status">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Locating…</span>
</div>

<div class="toasts" id="toasts"></div>

<div class="fab-group">
  <button class="fab" title="All places" onclick="toggleDrawer()">≡</button>
  <button class="fab" title="My location" onclick="centerOnUser()">◎</button>
</div>

<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div id="drawerBody"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
